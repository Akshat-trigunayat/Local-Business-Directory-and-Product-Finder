<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ShopEase</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.auth-wrap { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
.auth-card h2 { font-size: 1.6rem; margin-bottom: 0.4rem; }
.auth-card .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.auth-footer { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: 0.9rem; }
.auth-footer a { color: var(--accent); }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">🛒 ShopEase</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="sub">Login to your ShopEase account</p>
    <div id="msg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%; justify-content: center; padding: 0.75rem;" onclick="login()">Login</button>
    <div class="auth-footer">Don't have an account? <a href="/register">Register here</a></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
setupNav();
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) return showMsg('Fill all fields', 'error');
  const res = await api('/api/auth/login', 'POST', { email, password });
  if (res.role) {
    showToast('Login successful!');
    window.location.href = res.role === 'vendor' ? '/vendor' : '/products';
  } else {
    showMsg(res.message || 'Login failed', 'error');
  }
}
function showMsg(msg, type) {
  document.getElementById('msg').innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${msg}</div>`;
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
