<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - ShopEase</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.cart-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
@media(max-width:700px){ .cart-layout { grid-template-columns: 1fr; } }
.cart-item { display: flex; gap: 1rem; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); }
.cart-item:last-child { border-bottom: none; }
.cart-item-img { width: 70px; height: 70px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; overflow: hidden; }
.cart-item-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-family: 'Syne', sans-serif; margin-bottom: 0.2rem; }
.cart-item-price { color: var(--accent); font-weight: 700; }
.qty-ctrl { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
.qty-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: all 0.2s; }
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-num { width: 32px; text-align: center; font-weight: 600; }
.summary-row { display: flex; justify-content: space-between; margin-bottom: 0.7rem; font-size: 0.9rem; }
.summary-row.total { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-top: 0.5rem; padding-top: 0.7rem; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">🛒 ShopEase</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Your Cart</h1>
    <p id="cart-count">Loading...</p>
  </div>
  <div class="cart-layout">
    <div class="card" id="cart-items"><div class="loader">Loading cart...</div></div>
    <div class="card" id="cart-summary" style="display:none">
      <h3 style="margin-bottom:1.2rem">Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
      <div class="summary-row"><span>Shipping</span><span style="color:var(--success)">FREE</span></div>
      <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:1rem;padding:0.75rem" onclick="window.location.href='/checkout'">Proceed to Checkout →</button>
      <a href="/products" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:0.6rem">Continue Shopping</a>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/js/app.js"></script>
<script>
const EMOJI = { Electronics:'📱', Clothing:'👕', Food:'🍕', Books:'📚', Home:'🏠', Sports:'⚽', Other:'📦' };

async function loadCart() {
  const me = await getMe();
  if (!me.loggedIn) { window.location.href = '/login'; return; }
  await setupNav();
  const cart = await api('/api/cart');
  renderCart(cart);
}

function renderCart(cart) {
  const items = cart.items || [];
  const itemsDiv = document.getElementById('cart-items');
  const summaryDiv = document.getElementById('cart-summary');

  if (!items.length) {
    itemsDiv.innerHTML = `<div class="empty-state"><div class="icon">🛒</div><h3>Your cart is empty</h3><p>Browse products and add items</p><a href="/products" class="btn btn-primary" style="margin-top:1rem">Shop Now</a></div>`;
    document.getElementById('cart-count').textContent = '0 items';
    summaryDiv.style.display = 'none';
    return;
  }

  const total = items.reduce((s, i) => s + (i.product?.price || 0) * i.quantity, 0);
  document.getElementById('cart-count').textContent = `${items.length} item(s)`;
  document.getElementById('subtotal').textContent = formatPrice(total);
  document.getElementById('total').textContent = formatPrice(total);
  summaryDiv.style.display = 'block';

  itemsDiv.innerHTML = items.map(i => {
    const p = i.product;
    if (!p) return '';
    const cat = p.category || 'Other';
    return `
      <div class="cart-item" id="item-${p._id}">
        <div class="cart-item-img">
          ${p.image ? `<img src="${p.image}" onerror="this.parentElement.textContent='${EMOJI[cat]||'📦'}'">` : (EMOJI[cat]||'📦')}
        </div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-price">${formatPrice(p.price)}</div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${p._id}', ${i.quantity - 1})">−</button>
            <span class="qty-num">${i.quantity}</span>
            <button class="qty-btn" onclick="changeQty('${p._id}', ${i.quantity + 1})">+</button>
            <button class="btn btn-sm" style="background:transparent;border:none;color:var(--danger);cursor:pointer;margin-left:0.5rem" onclick="removeItem('${p._id}')">🗑 Remove</button>
          </div>
        </div>
        <div style="font-weight:700;color:var(--text);flex-shrink:0">${formatPrice(p.price * i.quantity)}</div>
      </div>
    `;
  }).join('');
}

async function changeQty(productId, qty) {
  if (qty < 0) return;
  await api('/api/cart/update', 'PUT', { productId, quantity: qty });
  const cart = await api('/api/cart');
  renderCart(cart);
  updateCartBadge();
}

async function removeItem(productId) {
  await api(`/api/cart/remove/${productId}`, 'DELETE');
  showToast('Item removed');
  const cart = await api('/api/cart');
  renderCart(cart);
  updateCartBadge();
}

loadCart();
</script>
</body>
</html>
