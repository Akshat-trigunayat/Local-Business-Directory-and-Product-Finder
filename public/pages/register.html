<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - ShopEase</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.auth-wrap { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 440px; }
.auth-card h2 { font-size: 1.6rem; margin-bottom: 0.4rem; }
.auth-card .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.role-select { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.1rem; }
.role-btn {
  padding: 0.9rem; border-radius: 10px; border: 2px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  text-align: center; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  transition: all 0.2s;
}
.role-btn .emoji { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }
.role-btn.active { border-color: var(--accent); background: rgba(249,115,22,0.1); }
.auth-footer { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: 0.9rem; }
.auth-footer a { color: var(--accent); }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">🛒 ShopEase</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h2>Create account</h2>
    <p class="sub">Join ShopEase as buyer or vendor</p>
    <div id="msg"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>I want to</label>
      <div class="role-select">
        <div class="role-btn active" id="role-buyer" onclick="selectRole('buyer')">
          <span class="emoji">🛍️</span> Shop / Buy
        </div>
        <div class="role-btn" id="role-vendor" onclick="selectRole('vendor')">
          <span class="emoji">🏪</span> Sell / Vendor
        </div>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%; justify-content: center; padding: 0.75rem;" onclick="register()">Create Account</button>
    <div class="auth-footer">Already have an account? <a href="/login">Login here</a></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
setupNav();
let selectedRole = 'buyer';
function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-buyer').classList.toggle('active', role === 'buyer');
  document.getElementById('role-vendor').classList.toggle('active', role === 'vendor');
}
async function register() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!name || !email || !password) return showMsg('Fill all fields', 'error');
  if (password.length < 6) return showMsg('Password too short', 'error');
  const res = await api('/api/auth/register', 'POST', { name, email, password, role: selectedRole });
  if (res.role) {
    showToast('Account created!');
    window.location.href = res.role === 'vendor' ? '/vendor' : '/products';
  } else {
    showMsg(res.message || 'Registration failed', 'error');
  }
}
function showMsg(msg, type) {
  document.getElementById('msg').innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${msg}</div>`;
}
</script>
</body>
</html>
